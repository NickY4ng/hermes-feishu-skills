# feishu-chat-file Skill 配置
# 将此文件复制到工作空间并填写实际值

# 飞书应用凭证（必填）
# 飞书应用凭证
app_id: "YOUR_APP_ID"  # 绽放
app_secret: "MjtlozmlObB0l7iLn5PKqcEXqjXMyqd3"  # 绽放

# 默认接收者（可选，可在命令行覆盖）
default_receiver: "YOUR_USER_OPEN_ID"  # 当前用户的open_id（绽放）

# API配置（一般无需修改）
api_base: "https://open.feishu.cn"
auth_endpoint: "/open-apis/auth/v3/tenant_access_token/internal/"
upload_endpoint: "/open-apis/im/v1/files"
message_endpoint: "/open-apis/im/v1/messages"

# 文件限制（飞书API限制）
max_file_size_mb: 30  # 最大30MB
supported_file_types:
  - "text/markdown"
  - "text/plain"
  - "application/pdf"
  - "image/jpeg"
  - "image/png"
  - "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
  - "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
  - "application/vnd.openxmlformats-officedocument.presentationml.presentation"